<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>KRONOS Admin</title>
    <style>
        :root{--bg:#ffffff;--panel:#f6f6f6;--text:#0b0b0b;--muted:#6b6b6b;--accent:#000000}
        html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
        .container{max-width:1000px;margin:36px auto;padding:28px}
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        h1{letter-spacing:0.12em;font-weight:700}
        a.btn{background:transparent;border:1px solid var(--text);padding:8px 12px;color:var(--text);text-decoration:none;font-weight:600;border-radius:6px}
        .grid{display:grid;gap:18px}
        .card{background:var(--panel);padding:18px;border-radius:10px;border:1px solid #eee}
        form .row{display:grid;gap:12px}
        form .row{grid-template-columns:1fr 1fr}
        label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
        input[type=text],input[type=number],textarea{width:100%;padding:10px;border:1px solid #e6e6e6;border-radius:6px;background:transparent;color:var(--text);font-size:14px}
        input[type=file]{padding:8px}
        button.primary{background:var(--accent);color:#fff;padding:12px 16px;border-radius:8px;border:0;font-weight:700;cursor:pointer}
        .inventory .item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:8px;border:1px solid #eee;background:#fff}
        .meta{display:flex;align-items:center;gap:12px}
        .thumbs{display:grid;grid-template-columns:repeat(4,40px);gap:6px}
        .thumbs img{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid #f0f0f0}
        .small{font-size:12px;color:var(--muted)}
        .danger{background:transparent;border:1px solid #d33;color:#d33;padding:8px 10px;border-radius:6px;font-weight:700;cursor:pointer}
        .preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
        .preview img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #eee}
        @media (max-width:720px){.container{padding:16px}.card form .row{grid-template-columns:1fr}.thumbs{grid-template-columns:repeat(6,40px)}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KRONOS — Admin</h1>
            <div>
                <a class="btn" href="/">Open Store</a>
            </div>
        </header>

        <section class="grid">
            <div class="card">
                <h2 style="margin:0 0 12px 0;">Add New Watch</h2>
                <form id="watchForm" enctype="multipart/form-data">
                    <div class="row">
                        <div>
                            <label for="name">Watch Name</label>
                            <input id="name" name="name" type="text" placeholder="e.g. Kronos Chrono" required>
                        </div>
                        <div>
                            <label for="price">Price (₹)</label>
                            <input id="price" name="price" type="number" min="0" placeholder="12999" required>
                        </div>
                    </div>

                    <div class="row" style="margin-top:12px;">
                        <div>
                            <label for="stock">Stock Qty</label>
                            <input id="stock" name="stock" type="number" min="0" placeholder="5" required>
                        </div>
                        <div>
                            <label for="images">Attach Photos (images only) — max 10</label>
                            <input id="images" name="images" type="file" accept="image/*" multiple max="10" data-max="10" required>
                            <div id="photosPreview" class="preview" aria-hidden="true"></div>
                        </div>
                    </div>

                    <div style="margin-top:12px;">
                        <label for="desc">Description</label>
                        <textarea id="desc" name="desc" rows="3" placeholder="Short description"></textarea>
                    </div>

                    <div style="margin-top:14px;display:flex;gap:12px;align-items:center">
                        <button type="submit" class="primary">Save Product</button>
                        <span class="small">Files will be uploaded to server and stored in <strong>/uploads</strong></span>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2 style="margin:0 0 12px 0;">Live Inventory</h2>
                <div id="watchesContainer" class="inventory" aria-live="polite">
                    <p class="small">Loading…</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Helper: create element from HTML
        function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild}

        // Preview selected files (client-side)
        const imagesInput = document.getElementById('images');
        const photosPreview = document.getElementById('photosPreview');
        imagesInput.addEventListener('change', () => {
            photosPreview.innerHTML = '';
            const max = parseInt(imagesInput.getAttribute('data-max') || '10', 10);
            if (imagesInput.files.length > max) {
                alert('Please select at most ' + max + ' images.');
                imagesInput.value = '';
                return;
            }
            Array.from(imagesInput.files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const img = document.createElement('img');
                img.alt = file.name;
                const reader = new FileReader();
                reader.onload = e => img.src = e.target.result;
                reader.readAsDataURL(file);
                photosPreview.appendChild(img);
            });
        });

        // Submit form via FormData with multiple photos
        document.getElementById('watchForm').addEventListener('submit', async function(e){
            e.preventDefault();
            const max = parseInt(imagesInput.getAttribute('data-max') || '10', 10);
            if (imagesInput.files.length > max) return alert('Maximum ' + max + ' images allowed.');

            const form = new FormData();
            form.append('name', document.getElementById('name').value.trim());
            form.append('price', document.getElementById('price').value);
            form.append('stock', document.getElementById('stock').value);
            form.append('desc', document.getElementById('desc').value.trim());
            for (let i = 0; i < imagesInput.files.length; i++) {
                form.append('images', imagesInput.files[i]);
            }

            try {
                const res = await fetch('/api/watches', { method: 'POST', body: form });
                const contentType = res.headers.get('content-type') || '';
                let data = null;
                let serverMessage = res.statusText;

                if (contentType.includes('application/json')) {
                    try {
                        data = await res.json();
                        serverMessage = data.message || data.error || JSON.stringify(data);
                    } catch (jsonErr) {
                        console.error('Failed to parse JSON error body:', jsonErr);
                    }
                } else {
                    const text = await res.text();
                    if (text) serverMessage = text;
                }

                if (res.ok && (data?.success || data?.watch)) {
                    alert('Saved successfully');
                    this.reset();
                    photosPreview.innerHTML = '';
                    loadWatches();
                } else {
                    alert('Upload failed: ' + (serverMessage || res.statusText));
                }
            } catch (err) {
                console.error(err);
                alert('Upload failed: ' + (err.message || 'Network error'));
            }
        });

        // Load and render watches with thumbnails and delete action
        async function loadWatches(){
            const container = document.getElementById('watchesContainer');
            container.innerHTML = '<p class="small">Loading…</p>';
            try{
                const res = await fetch('/api/watches');
                const watches = await res.json();
                container.innerHTML = '';
                if(!watches || watches.length === 0){
                    container.innerHTML = '<p class="small">No products available.</p>';
                    return;
                }

                watches.forEach(w => {
                    const thumbsHtml = (w.images && w.images.length) ?
                        w.images.map(src => `<img src="${src}" alt="thumb">`).join('') :
                        '<div class="small">No images</div>';

                    const item = el(`
                        <div class="item">
                            <div class="meta">
                                <div class="thumbs">${thumbsHtml}</div>
                                <div>
                                    <div style="font-weight:700">${escapeHtml(w.name || 'Untitled')}</div>
                                    <div class="small">₹${Number(w.price||0).toLocaleString('en-IN')} • Stock: ${w.stock||0}</div>
                                </div>
                            </div>
                            <div style="display:flex;gap:8px;align-items:center">
                                <button class="danger" data-id="${w.id}">Delete</button>
                            </div>
                        </div>
                    `);

                    container.appendChild(item);
                });

                // attach delete handlers
                container.querySelectorAll('button.danger').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        if(!confirm('Remove product?')) return;
                        try{
                            await fetch('/api/watches/' + id, { method: 'DELETE' });
                            loadWatches();
                        }catch(e){console.error(e);alert('Delete failed')}
                    });
                });

            }catch(err){
                console.error(err);
                container.innerHTML = '<p class="small">Failed to load inventory.</p>';
            }
        }

        function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[c]));}

        // Initialize
        loadWatches();
    </script>
</body>
</html>
